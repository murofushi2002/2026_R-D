experiment:
  name: tokyo_senti_persona
  seed: 42

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  models_dir: models
  reports_dir: reports
  artifacts_dir: artifacts

data:
  target_city: Tokyo
  city_slug: tokyo
  inside_airbnb_page: https://insideairbnb.com/get-the-data/
  inside_airbnb_snapshot: latest
  inside_airbnb_files:
    - listings.csv.gz
    - reviews.csv.gz
    - calendar.csv.gz
  target_language: en
  language_threshold: 0.80
  strict_language_filter: false
  finetune_review_window_months: 3
  finetune_review_window_end: latest
  sentiment_eval_review_window_months: 3
  sentiment_eval_review_window_end: before_finetune
  max_airbnb_reviews: null

sentiment_labeling:
  model_name: models/finetune
  batch_size: 64
  max_length: 256
  min_confidence: 0.95
  max_labeled_reviews: null
  max_eval_labeled_reviews: null
  balance_classes: true
  max_per_class: null
  balance_eval_classes: true
  max_eval_per_class: null
  positive_labels:
    - positive
    - pos
    - label_1
  negative_labels:
    - negative
    - neg
    - label_0

occupancy:
  source: auto
  review_rate: 0.50
  default_length_of_stay: 3.0
  cap_review_based_occupancy: 0.70
  min_calendar_review_correlation: 0.60

training:
  base_model: models/sentense
  output_subdir: senticse
  batch_size: 32
  epochs: 5
  learning_rate: 0.00002
  temperature: 0.07
  max_length: 256
  max_train_samples: null
  eval_samples_per_class: 1000
  mixed_precision: true

model_evaluation:
  max_samples_per_class: 1000

embedding:
  batch_size: 256
  normalize: true

clustering:
  n_components_cluster: 50
  n_components_vis: 2
  n_neighbors: 15
  deterministic_umap: false
  n_jobs: -1
  fit_separate_visual_umap: false
  min_dist_cluster: 0.0
  min_dist_vis: 0.1
  min_cluster_size_ratio: 0.02
  min_samples: 5
  metric_sample_size: 10000
  representative_reviews_per_cluster: 12

persona:
  ollama_model: qwen3:4b
  output_language: Japanese
  repetitions: 3
  temperature: 0.0
  timeout_seconds: 120

timeseries:
  lag_months: 1
  min_monthly_reviews: 5
  smoothing_window: 3

evaluation:
  sgts_min_delta: 0.40
  silhouette_min: 0.30
  noise_ratio_max: 0.20
  persona_name_consistency_min: 0.70
  occupancy_abs_corr_min: 0.30
